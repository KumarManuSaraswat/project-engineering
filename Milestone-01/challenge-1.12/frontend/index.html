<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    #chat-container { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; }
    .message { margin-bottom: 16px; display: flex; }
    .user { justify-content: flex-end; }
    .assistant { justify-content: flex-start; }
    .message-content { max-width: 70%; padding: 12px 16px; border-radius: 18px; }
    .user .message-content { background: #007bff; color: white; }
    .assistant .message-content { background: white; border: 1px solid #e0e0e0; }
    #input-container { padding: 20px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
    #message-input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 24px; outline: none; }
    #send-btn { padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 24px; cursor: pointer; }
    #send-btn:hover { background: #0056b3; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="chat-container"></div>
  <div id="input-container">
    <input type="text" id="message-input" placeholder="Type your message..." />
    <button id="send-btn">Send</button>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    
    let messages = [];

    async function sendMessage() {
      const content = messageInput.value.trim();
      if (!content) return;

      // Add user message
      messages.push({ role: 'user', content });
      messageInput.value = '';
      sendBtn.disabled = true;
      renderMessages();

      try {
        const response = await fetch('https://ai-chatbot-backend-v2ai.onrender.com', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
       });
        
        const data = await response.json();
        if (data.response) {
          messages.push({ role: 'assistant', content: data.response });
          renderMessages();
        }
      } catch (error) {
        console.error('Error:', error);
        messages.push({ role: 'assistant', content: 'Sorry, something went wrong.' });
        renderMessages();
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    function renderMessages() {
      chatContainer.innerHTML = messages.map(msg => `
        <div class="message ${msg.role}">
          <div class="message-content">${msg.content}</div>
        </div>
      `).join('');
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    messageInput.focus();
  </script>
</body>
</html>
